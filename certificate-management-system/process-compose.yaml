version: "0.5"

processes:
  postgres:
    command: postgres -D ./.postgres
    readiness_probe:
      exec:
        command: pg_isready -h localhost -p 5432 -U postgres
      initial_delay_seconds: 2
      period_seconds: 5
      timeout_seconds: 2
      success_threshold: 1
      failure_threshold: 3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: certificate_db
    setup:
      command: |
        mkdir -p ./.postgres
        if [ ! -f ./.postgres/PG_VERSION ]; then
          initdb -D ./.postgres -U postgres --auth=trust
          echo "listen_addresses = '*'" >> ./.postgres/postgresql.conf
          echo "host all all 0.0.0.0/0 trust" >> ./.postgres/pg_hba.conf
        fi

  backend:
    command: cd backend && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: process_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/certificate_db
      SECRET_KEY: your-secret-key-here
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      APP_NAME: Certificate Management System
      APP_VERSION: 0.1.0
      DEBUG: "True"

  frontend:
    command: cd web-frontend && npm start
    depends_on:
      backend:
        condition: process_started
    environment:
      PORT: 3000
      REACT_APP_API_URL: http://localhost:8000/api

log_level: info