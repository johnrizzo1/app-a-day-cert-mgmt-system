global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector'
    scrape_interval: 10s
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          group: 'otel-collector'

  - job_name: 'otel-metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          group: 'otel-metrics'

  - job_name: 'postgres'
    scrape_interval: 10s
    static_configs:
      - targets: ['postgres:5432']
        labels:
          group: 'postgres'